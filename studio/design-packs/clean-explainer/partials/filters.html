<!-- ============================================================
     Design Pack: clean-explainer — procedural SVG filters
     Intentionally minimal: NO halftone, NO spray-rough, NO grain.
     A single soft drop-shadow used by clean cards/panels. Deterministic
     (no randomness). Most elevation in this pack is plain CSS box-shadow
     (see base.css); this filter is here for SVG/iconography that needs a
     soft shadow the CSS property can't reach.

     Inject once at the top of #root. Reference by CSS/SVG:
       filter: url(#soft-shadow);
     ============================================================ -->
<svg width="0" height="0" style="position: absolute" aria-hidden="true">
  <defs>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <fedropshadow dx="0" dy="6" stdDeviation="10" flood-color="#14171a" flood-opacity="0.12" />
    </filter>
  </defs>
</svg>
